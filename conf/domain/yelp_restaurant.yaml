# =====================================================================
# Step 5: 结构化配置落地 (Structured Configuration Landing)
# =====================================================================
name: yelp_restaurant

# =====================================================================
# Step 4: 基座模型选型与对齐 (Base Model Selection)
# =====================================================================
# 选用经过餐饮领域自适应预训练的 BERT-DK_rest 捕捉深层语义
bert_mapper: /home/mysjz/mywork/Models/BERT-DK_rest
# 选用 mpnet 作为 SBERT 映射器，确保种子词与句子在同一高质量的高维空间内对齐
sbert_mapper: /home/mysjz/mywork/Models/all-mpnet-base-v2

# =====================================================================
# Step 1: 以终为始：定义推荐系统的特征维度 (Core Aspect Categories)
# =====================================================================
# 提炼出边界清晰且对推荐系统决策最有价值的 4 个核心维度
aspect_category_mapper: ['food', 'service', 'ambience', 'price']

# =====================================================================
# Step 2: 精准打击：挖掘与筛选高质量方面种子词 (Aspect Seed Words)
# =====================================================================
# 遵循高频、专一、剔除多义词原则，每个维度配置数量均衡（约10个）的名词性锚点
aspect_seed_mapper:
  food: ["food", "taste", "menu", "chicken", "burger", "pizza", "sushi", "spicy", "meal", "ingredients"]
  service: ["service", "staff", "waiter", "waitress", "manager", "bartender", "server", "tips", "hostess", "attitude"]
  ambience: ["ambience", "atmosphere", "environment", "seating", "music", "decor", "vibe", "patio", "interior", "lighting"]
  price: ["price", "cost", "value", "bill", "check", "bucks", "pricing", "affordable", "expensive", "cheap"]

# =====================================================================
# Step 3: 情感锚定：定义情感极性与基准词 (Sentiment Categories & Seeds)
# =====================================================================
# 设定绝对的正负极性，并融入 Yelp 评论域的专属强烈情感词
sentiment_category_mapper: ['negative', 'positive']
sentiment_seed_mapper:
  positive: ["good", "great", "nice", "excellent", "perfect", "delicious", "amazing", "friendly", "fantastic", "awesome"]
  negative: ["bad", "terrible", "horrible", "disappointed", "awful", "rude", "overpriced", "worst", "bland", "dirty"]

# ---------------------------------------------------------------------
# 模型控制与超参数设置 (Hyperparameters & Thresholds)
# ---------------------------------------------------------------------
# 设置置信度阈值：低于该阈值的伪标签将被丢弃，保证训练数据的纯净度
cat_threshold: 0.6
pol_threshold: 0.55

# 验证集切分（针对弱监督生成的伪标签）
validation_data_size: 100
hyper_validation_size: 0.8

# CASC 备用参数（如需启用其他变体模型时使用）
N: 5
M: 100
# 权重在此可以设为均等或根据 Yelp 词频微调，纯抽取场景影响不大
aspect_weights: [100, 100, 100, 100]
sentiment_weights: [100, 100]

# 优化器与 Focal Loss 参数
params:
  learning_rate: 1e-5
  beta1: 0.97
  beta2: 0.999
  batch_size: 16
  gamma1: 4
  gamma2: 4